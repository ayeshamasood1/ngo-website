<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Shajar Hope Alliance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- NAVBAR -->
  <nav class="bg-white shadow-md">
    <div class="max-w-screen-xl mx-auto flex items-center justify-between p-4">
      <!-- Logo / Name -->
      <div class="flex items-center space-x-2">
        <img src="./img/hand.png.png" class="w-10" alt="Logo">
        <span class="text-xl font-bold text-green-700">Shajar Hope Alliance</span>
      </div>

      <!-- Navigation Links -->
      <ul class="flex space-x-6 font-medium">
        <li><a href="index.html" class="hover:text-green-600">Home</a></li>
        <li><a href="./src/pages/about/about.html" class="hover:text-green-600">About</a></li>
        <li><a href="./src/pages/contact/contact.html" class="hover:text-green-600">Contact</a></li>
      </ul>

      <!-- Only Sign In Button (green) -->
      <div class="space-x-3">
        <a href="signin.html" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Sign In</a>
      </div>
    </div>
  </nav>

  <!-- SIGN UP FORM -->
  <section class="flex items-center justify-center min-h-screen px-4">
    <div class="bg-white p-10 rounded-lg shadow-md w-full max-w-md mt-10">
      <h1 class="text-2xl font-bold text-green-700 mb-6 text-center">Sign Up</h1>
      <form>
        <label class="block mb-2 font-medium">Full Name</label>
        <input type="text" class="w-full p-2 border rounded mb-4" placeholder="Your Name" required>

        <label class="block mb-2 font-medium">Email</label>
        <input type="email" class="w-full p-2 border rounded mb-4" placeholder="you@example.com" required>

        <label class="block mb-2 font-medium">Password</label>
        <input type="password" class="w-full p-2 border rounded mb-4" placeholder="********" required>

        <label class="block mb-2 font-medium">Confirm Password</label>
        <input type="password" class="w-full p-2 border rounded mb-6" placeholder="********" required>

        <button class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">Sign Up</button>
      </form>

      <p class="mt-4 text-center text-gray-600 text-sm">
        Already have an account? <a href="signin.html" class="text-green-600 hover:underline">Sign In</a>
      </p>
    </div>
  </section>
  <br>

   <footer class="bg-green-600 text-white p-6 text-center">
    &copy; 2026 Our NGO. All rights reserved.
  </footer>

</body>
</html>
